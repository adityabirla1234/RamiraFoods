# ── Server ──────────────────────────────────────────────────────────────────
server.port=8080

# ── CORS: allow the frontend origin (update to your real domain in prod) ──
app.cors.allowed-origins=http://localhost:3000,http://localhost:5500,http://127.0.0.1:5500,file://

# ── Telegram Bot ─────────────────────────────────────────────────────────────
# Set these via environment variables or replace the placeholders:
#   TELEGRAM_BOT_TOKEN   → Get from @BotFather on Telegram
#   TELEGRAM_CHAT_ID     → Your personal chat ID or a group/channel ID
#
# To get your chat ID: message @userinfobot on Telegram.
# To get a group chat ID: add @RawDataBot to the group and send any message.
telegram.bot.token=${TELEGRAM_BOT_TOKEN:8641569906:AAHE2BWlX-cli5UFHcdp0Nk-M2L2Voyft4I}
telegram.chat.id=${TELEGRAM_CHAT_ID:1314075423}

# ── Order Queue ───────────────────────────────────────────────────────────────
# Max concurrent Telegram notification workers (tune based on Telegram rate limit)
app.queue.notification-threads=5
# Bounded queue capacity (orders queued in memory if workers are busy)
app.queue.capacity=10000

# ── Logging ───────────────────────────────────────────────────────────────────
logging.level.com.ramirafoods=DEBUG
